name: Manual Windows Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows test package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri package
        run: npm run tauri build

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: mutishell-release-exe
          path: src-tauri/target/release/mutishell.exe
          if-no-files-found: error

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: mutishell-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
